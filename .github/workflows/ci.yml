# PulseStream CI - Tests and Docker build
# All env vars from Bitwarden Secrets Manager - no defaults
# Required GitHub secrets: BW_ACCESS_TOKEN, BW_SECRET_ID_CONFIG
# Bitwarden: create a single "pulsestream-config" secret (JSON) - see .github/BITWARDEN_SETUP.md

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch config from Bitwarden
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            ${{ secrets.BW_SECRET_ID_CONFIG }} > PULSESTREAM_CONFIG_JSON

      - name: Export config as env vars
        run: |
          python -c "
          import json, os
          config = json.loads(os.environ['PULSESTREAM_CONFIG_JSON'])
          with open(os.environ['GITHUB_ENV'], 'a') as f:
            for k, v in config.items():
              val = str(v).replace(chr(10), ' ').replace(chr(13), '')
              f.write(f'{k}={val}\n')
          "

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.3.2
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction

      - name: Start Postgres and Redis
        run: docker-compose up -d postgres redis

      - name: Wait for services
        run: |
          until docker-compose exec -T postgres pg_isready -U $POSTGRES_USER -d $POSTGRES_DB; do sleep 2; done
          until docker-compose exec -T redis redis-cli ping; do sleep 2; done

      - name: Run migrations
        run: poetry run alembic upgrade head

      - name: Run tests
        run: poetry run pytest --no-cov -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pulsestream:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pulsestream:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
