# CD - Deploy to Oracle Cloud compute instance
# Required GitHub secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# Optional: SSH_KEY_PASSPHRASE (if your private key is passphrase-protected)
# Optional GitHub variable: APP_DIR (e.g. ~/pulsestream) - deploy path on Oracle instance
# On Oracle instance: Docker, docker-compose, .env, and docker-compose.prod.yml

name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    env:
      APP_DIR: ${{ vars.APP_DIR || '~/pulsestream' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure app directory exists on Oracle Cloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          envs: APP_DIR
          script: mkdir -p $APP_DIR

      - name: Copy docker-compose.prod.yml to Oracle Cloud
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          source: "docker-compose.prod.yml"
          target: ${{ env.APP_DIR }}

      - name: Docker login on Oracle Cloud
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          request_pty: true
          script: |
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Deploy to Oracle Cloud
        env:
          DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/pulsestream:latest
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          envs: APP_DIR,DOCKERHUB_IMAGE
          script: |
            set -e
            mkdir -p $APP_DIR
            cd $APP_DIR
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune --force