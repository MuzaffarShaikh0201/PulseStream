# Production compose - uses pre-built image from Docker Hub
# Set DOCKERHUB_IMAGE (e.g. username/pulsestream:latest) or DOCKERHUB_USERNAME

version: "3.8"

services:
    postgres:
        image: postgres:16-alpine
        container_name: pulsestream-postgres
        env_file: .env
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - pulsestream

    redis:
        image: redis:7-alpine
        container_name: pulsestream-redis
        command: redis-server --appendonly yes
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - pulsestream

    api:
        image: ${DOCKERHUB_IMAGE}
        container_name: pulsestream-api
        command: ["api"]
        env_file: .env
        environment:
            POSTGRES_HOST: postgres
            POSTGRES_PORT: 5432
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            ENVIRONMENT: ${ENVIRONMENT}
        ports:
            - "8000:8000"
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - pulsestream

    worker-base:
        image: ${DOCKERHUB_IMAGE}
        container_name: pulsestream-worker-base
        command: ["worker", "--base"]
        env_file: .env
        environment:
            POSTGRES_HOST: postgres
            POSTGRES_PORT: 5432
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            ENVIRONMENT: ${ENVIRONMENT}
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - pulsestream

    worker-aggregator:
        image: ${DOCKERHUB_IMAGE}
        container_name: pulsestream-worker-aggregator
        command: ["worker", "--aggregator"]
        env_file: .env
        environment:
            POSTGRES_HOST: postgres
            POSTGRES_PORT: 5432
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            ENVIRONMENT: ${ENVIRONMENT}
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - pulsestream

volumes:
    postgres_data:
    redis_data:

networks:
    pulsestream:
        driver: bridge
